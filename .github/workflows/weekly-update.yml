name: Weekly Scopus Update

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate SCOPUS_API_KEY secret
        run: |
          if [ -z "${SCOPUS_API_KEY}" ]; then
            echo "SCOPUS_API_KEY is not configured for this repository/workflow context."
            echo "Go to Settings > Secrets and variables > Actions and add repository secret SCOPUS_API_KEY."
            exit 1
          fi

      - name: Run pipelines (full-time and part-time)
        run: |
          python src/pipeline.py --input "Full timers ORCID.csv" --output-dir outputs
          python src/pipeline.py --input "Part timers ORCID.csv" --output-dir outputs/part_timers

      - name: Commit and push updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/summary.csv outputs/publications_raw.csv outputs/part_timers/summary.csv outputs/part_timers/publications_raw.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly Scopus data refresh"
            git push
          fi
